# Firebase App Hosting production configuration for the root-managed Next.js app.
#
# Sensitive values are referenced from Secret Manager. Create/update them with
# `firebase apphosting:secrets:set <NAME>` before rolling out.

runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 1024

env:
  # App Hosting deploys run `npm run build`; explicit type validation remains
  # available through `npm run typecheck` before pushing.
  - variable: NEXT_IGNORE_TYPECHECK
    value: "1"
    availability:
      - BUILD

  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: chandra-f6e13.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: chandra-f6e13
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: chandra-f6e13.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: NEXT_PUBLIC_FIREBASE_APP_ID
    availability:
      - BUILD
      - RUNTIME

  - variable: FIREBASE_PROJECT_ID
    value: chandra-f6e13
    availability:
      - RUNTIME
  - variable: FIREBASE_STORAGE_BUCKET
    value: chandra-f6e13-tutor-knowledge
    availability:
      - RUNTIME
  # Use either FIREBASE_SERVICE_ACCOUNT_KEY or the split
  # FIREBASE_CLIENT_EMAIL/FIREBASE_PRIVATE_KEY secrets. The local env currently
  # does not contain either credential, so these must be supplied before
  # production admin-backed features will work.
  # - variable: FIREBASE_SERVICE_ACCOUNT_KEY
  #   secret: FIREBASE_SERVICE_ACCOUNT_KEY
  #   availability:
  #     - RUNTIME
  # - variable: FIREBASE_CLIENT_EMAIL
  #   secret: FIREBASE_CLIENT_EMAIL
  #   availability:
  #     - RUNTIME
  # - variable: FIREBASE_PRIVATE_KEY
  #   secret: FIREBASE_PRIVATE_KEY
  #   availability:
  #     - RUNTIME

  - variable: OPENROUTER_API_KEY
    secret: OPENROUTER_API_KEY
    availability:
      - RUNTIME
  - variable: OPENROUTER_BASE_URL
    value: https://openrouter.ai/api/v1
    availability:
      - RUNTIME
  - variable: DEFAULT_MODEL
    value: openai/gpt-5.4-mini
    availability:
      - RUNTIME
  - variable: FRONTEND_ORIGIN
    value: https://chandra-frontend--chandra-f6e13.us-central1.hosted.app
    availability:
      - RUNTIME
  - variable: OPENROUTER_HTTP_REFERER
    value: https://chandra-frontend--chandra-f6e13.us-central1.hosted.app
    availability:
      - RUNTIME
  - variable: OPENROUTER_APP_TITLE
    value: Chandra
    availability:
      - RUNTIME

  - variable: BACKEND_API_BASE_URL
    # Bare Cloud Run origin for chandra-backend; keep this as an origin only,
    # with no trailing path.
    value: https://chandra-backend-whjsen4ula-uc.a.run.app
    availability:
      - RUNTIME
  - variable: BACKEND_ID_TOKEN_AUDIENCE
    # Same bare Cloud Run origin. The Next.js server uses this to mint an
    # identity token when calling the authenticated private backend.
    value: https://chandra-backend-whjsen4ula-uc.a.run.app
    availability:
      - RUNTIME
  - variable: BACKEND_SHARED_SECRET
    # Must match the backend value so the frontend can send
    # X-Chandra-Internal-Secret to chandra-backend.
    secret: BACKEND_SHARED_SECRET
    availability:
      - RUNTIME
  - variable: LEARNING_PROFILE_UPDATE_SECRET
    secret: LEARNING_PROFILE_UPDATE_SECRET
    availability:
      - RUNTIME

  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
    availability:
      - RUNTIME
  - variable: GOOGLE_CLOUD_PROJECT
    value: chandra-f6e13
    availability:
      - RUNTIME
  - variable: GOOGLE_CLOUD_LOCATION
    value: us
    availability:
      - RUNTIME
  - variable: VERTEX_EMBEDDING_MODEL
    value: gemini-embedding-2
    availability:
      - RUNTIME
  - variable: VERTEX_EMBEDDING_DIMENSIONS
    value: "768"
    availability:
      - RUNTIME
